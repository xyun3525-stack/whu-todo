<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校园成长待办</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">网页校园界面</p>
          <h1>校园成长待办</h1>
          <div class="hero-quote" id="hero-quote">
            <p class="hero-quote-tag">此刻小句</p>
            <p class="hero-quote-line" id="hero-quote-line"></p>
            <p class="hero-quote-note" id="hero-quote-note"></p>
            <div class="hero-quote-dots" id="hero-quote-dots"></div>
          </div>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
      </header>

      <nav class="tab-bar">
        <button class="tab-link active" data-view="today">今日</button>
        <button class="tab-link" data-view="tasks">任务</button>
        <button class="tab-link" data-view="campus">校园</button>
        <button class="tab-link" data-view="growth">成长</button>
        <button class="tab-link" data-view="settings">设置</button>
      </nav>

      <main class="view-stack">
        <section class="view active" data-panel="today">
          <div class="two-up">
            <article class="card overview-card">
              <p class="card-kicker">今日概览</p>
              <h2 id="today-summary-title">加载中...</h2>
              <p class="muted" id="today-summary-meta"></p>
              <div class="pill-row" id="today-pills"></div>
            </article>

            <article class="card">
              <div class="card-head">
                <div>
                  <p class="card-kicker">快速添加</p>
                  <h3>快速塞进今天任务栏</h3>
                </div>
              </div>
              <form id="quick-add-form" class="stack-form">
                <label>
                  <span>任务标题</span>
                  <input id="quick-task-title" name="title" type="text" placeholder="比如：整理实验数据" />
                </label>
                <button class="primary-btn" type="submit">加入今日</button>
              </form>
            </article>
          </div>

          <article class="card">
            <div class="card-head">
              <div>
                <p class="card-kicker">今日任务</p>
                <h3>今天要推进的事项</h3>
              </div>
            </div>
            <div id="today-task-list" class="task-grid"></div>
          </article>
        </section>

        <section class="view" data-panel="tasks">
          <div class="two-up">
            <article class="card">
              <div class="card-head">
                <div>
                  <p class="card-kicker">任务编辑</p>
                  <h3 id="task-form-heading">新建任务</h3>
                </div>
                <button class="ghost-btn" id="task-form-reset" type="button">清空</button>
              </div>

              <form id="task-form" class="stack-form">
                <label>
                  <span>标题</span>
                  <input id="task-title" name="title" type="text" required />
                </label>

                <div class="field-row">
                  <label>
                    <span>优先级</span>
                    <select id="task-priority" name="priority">
                      <option value="normal">普通</option>
                      <option value="important">重要</option>
                      <option value="urgent">紧急</option>
                    </select>
                  </label>
                  <label>
                    <span>截止日期</span>
                    <input id="task-deadline" name="deadline" type="date" />
                  </label>
                </div>

                <div class="field-row">
                  <label>
                    <span>预计分钟</span>
                    <input id="task-minutes" name="estimated_minutes" type="number" min="1" value="25" />
                  </label>
                  <label>
                    <span>重复</span>
                    <select id="task-repeat" name="repeat_rule">
                      <option value="none">不重复</option>
                      <option value="daily">每天</option>
                      <option value="weekly">每周</option>
                    </select>
                  </label>
                </div>

                <label class="checkbox-row">
                  <input id="task-today" name="scheduled_for_today" type="checkbox" />
                  <span>加入今日</span>
                </label>

                <button class="primary-btn" id="task-submit" type="submit">保存任务</button>
              </form>
            </article>

            <article class="card">
              <div class="card-head">
                <div>
                  <p class="card-kicker">任务看板</p>
                  <h3>任务总览</h3>
                </div>
              </div>

              <div class="segmented-control" id="task-view-switcher">
                <button class="segment active" data-task-view="planned" type="button">待办</button>
                <button class="segment" data-task-view="today" type="button">今日</button>
                <button class="segment" data-task-view="completed" type="button">已完成</button>
              </div>

              <div class="task-search-bar">
                <input id="task-search-input" type="search" placeholder="搜索任务标题…" />
                <select id="task-priority-filter">
                  <option value="">全部优先级</option>
                  <option value="urgent">紧急</option>
                  <option value="important">重要</option>
                  <option value="normal">普通</option>
                </select>
              </div>

              <div id="task-list" class="task-grid"></div>
            </article>
          </div>
        </section>

        <section class="view" data-panel="campus">
          <div class="two-up campus-layout">
            <article class="card">
              <div class="card-head">
                <div>
                  <p class="card-kicker">校园信息</p>
                  <h3 id="campus-name-heading">校园名称</h3>
                </div>
              </div>

              <form id="campus-name-form" class="stack-form">
                <label>
                  <span>改名</span>
                  <input id="campus-name-input" name="name" type="text" />
                </label>
                <button class="primary-btn" type="submit">更新名称</button>
              </form>

              <div class="stat-block" id="campus-stats"></div>
            </article>

            <article class="card">
              <div class="card-head">
                <div>
                  <p class="card-kicker">建筑背包</p>
                  <h3>选择建筑再点格子</h3>
                </div>
                <p class="selection-note" id="selected-building-label">当前未选择建筑</p>
              </div>
              <div id="inventory-list" class="inventory-grid"></div>
            </article>
          </div>

          <article class="card">
            <div class="card-head">
              <div>
                <p class="card-kicker">校园地块</p>
                <h3>校园建设区</h3>
              </div>
            </div>
            <div id="campus-grid" class="campus-grid"></div>
          </article>
        </section>

        <section class="view" data-panel="growth">
          <div class="three-up">
            <article class="card stat-card">
              <p class="card-kicker">等级</p>
              <h2 id="growth-level">0 级</h2>
              <p class="muted" id="growth-xp"></p>
            </article>
            <article class="card stat-card">
              <p class="card-kicker">连续记录</p>
              <h2 id="growth-streak">0</h2>
              <p class="muted" id="growth-weekly"></p>
            </article>
            <article class="card stat-card">
              <p class="card-kicker">图鉴收藏</p>
              <h2 id="growth-catalog">0</h2>
              <p class="muted" id="growth-inventory"></p>
            </article>
          </div>

          <article class="card">
            <div class="card-head">
              <div>
                <p class="card-kicker">经验进度</p>
                <h3>经验条</h3>
              </div>
            </div>
            <div class="progress-rail">
              <div class="progress-fill" id="growth-progress-fill"></div>
            </div>
          </article>
        </section>

        <section class="view" data-panel="settings">
          <article class="card">
            <div class="card-head">
              <div>
                <p class="card-kicker">本地存档</p>
                <h3>当前存档摘要</h3>
              </div>
            </div>
            <div id="settings-summary" class="settings-grid"></div>
            <button class="danger-btn" id="reset-data-btn" type="button">重置本地数据</button>
          </article>

          <article class="card">
            <div class="card-head">
              <div>
                <p class="card-kicker">建筑图标</p>
                <h3>自定义建筑图标</h3>
              </div>
              <p class="selection-note">上传图片替换默认图标，刷新后仍保留</p>
            </div>
            <div id="building-icons-list" class="building-icons-grid"></div>
          </article>

          <article class="card">
            <div class="card-head">
              <div>
                <p class="card-kicker">建筑类型管理</p>
                <h3>自定义建筑类型</h3>
              </div>
            </div>
            <div class="card-head-actions">
              <button class="ghost-btn" id="import-building-types-btn" type="button">导入</button>
              <button class="ghost-btn" id="export-building-types-btn" type="button">导出全部</button>
              <button class="primary-btn" id="add-building-type-btn" type="button">新建建筑</button>
            </div>
            <input type="file" id="import-building-types-file" class="hidden" accept=".json" />
            <div id="building-types-list" class="building-types-grid"></div>
          </article>
        </section>
      </main>
    </div>

    <div class="modal-layer hidden" id="modal-layer">
      <div class="modal-card hidden" id="upgrade-modal"></div>
      <div class="modal-card hidden" id="reward-modal"></div>
      <div class="modal-card hidden" id="building-form-modal"></div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="/campus-art.js" defer></script>
    <script src="/app.js" defer></script>
  </body>
</html>
